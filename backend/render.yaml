services:
  - type: web
    name: bookcross-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: bookcross-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: bookcross-db
          property: connectionString

databases:
  - name: bookcross-db
