services:
  - type: web
    name: book-4awi
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: book-4awi.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://book-six-delta.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://book-six-delta.vercel.app
      - key: DATABASE_URL
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
